<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main style="min-height:100vh;display:grid;place-items:center;padding:1rem;">
    <section class="section-shell" style="width:min(100%,760px);">
      <div class="section-inner notfound-card" style="text-align:center;background:linear-gradient(135deg,rgba(255,95,162,.18),rgba(77,212,255,.14),rgba(255,154,61,.14));border-radius:1.4rem;">
        <span class="badge">404 error</span>
        <h1 class="title">This page is not available.</h1>
        <p class="copy">The project details link opened a separate 404 window as requested.</p>
        <div style="margin-top:1rem;display:flex;justify-content:center;">
          <a class="btn btn-primary" href="index.html">Back to home</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
